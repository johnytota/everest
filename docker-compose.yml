services:

  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: WHqpp1Tu7jRFhFYs
    volumes:
      - mongo_data:/data/db

  api:
    build: .
    restart: unless-stopped
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      MONGO_URI: mongodb://root:WHqpp1Tu7jRFhFYs@mongo:27017/?authSource=admin
    depends_on:
      - mongo

  scraper:
    build: .
    restart: unless-stopped
    command: python main.py
    env_file: .env
    environment:
      MONGO_URI: mongodb://root:WHqpp1Tu7jRFhFYs@mongo:27017/?authSource=admin
      TZ: Europe/Lisbon
    volumes:
      - /root/everest/cookies.json:/app/cookies.json
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  mongo_data:
  cookies:
